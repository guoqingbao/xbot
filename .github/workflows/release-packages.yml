name: release-packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: validate-release-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate package versions
        id: version
        run: |
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          npm_version="$(node -p "require('./npm/package.json').version")"
          if [ "$cargo_version" != "$npm_version" ]; then
            echo "Cargo.toml version ($cargo_version) must match npm/package.json version ($npm_version)" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            expected_tag="v${cargo_version}"
            if [ "${{ github.ref_name }}" != "$expected_tag" ]; then
              echo "Tag ${{ github.ref_name }} must match package version $expected_tag" >&2
              exit 1
            fi
          fi

          if [ "${{ github.event_name }}" = "release" ]; then
            expected_tag="v${cargo_version}"
            if [ "${{ github.event.release.tag_name }}" != "$expected_tag" ]; then
              echo "Release tag ${{ github.event.release.tag_name }} must match package version $expected_tag" >&2
              exit 1
            fi
          fi

          echo "version=${cargo_version}" >> "$GITHUB_OUTPUT"

  linux:
    name: linux-${{ matrix.npm_target }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-unknown-linux-gnu
            npm_target: linux-x64
            deb_arch: amd64
          - rust_target: aarch64-unknown-linux-gnu
            npm_target: linux-arm64
            deb_arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: taiki-e/install-action@cross
      - uses: taiki-e/install-action@cargo-deb
      - name: Install ARM64 Debian packaging dependencies
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        run: |
          set -eux
          sudo dpkg --add-architecture arm64
          . /etc/os-release
          # GitHub's Ubuntu 24.04 runners use Deb822 sources.
          # After adding arm64 as a foreign architecture, apt otherwise tries to
          # fetch arm64 packages from archive.ubuntu.com/security.ubuntu.com,
          # which causes 404s. Restrict the default Ubuntu sources to amd64.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i 's/^Components:/Architectures: amd64\nComponents:/' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # Add proper Ubuntu ports sources for arm64 packages.
          cat <<EOF | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: ${VERSION_CODENAME} ${VERSION_CODENAME}-updates ${VERSION_CODENAME}-backports ${VERSION_CODENAME}-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libc6:arm64 \
            libc6-dev:arm64 \
            libgcc-s1:arm64 \
            dpkg-dev

      - name: Build binary
        run: cross build --release --target ${{ matrix.rust_target }}
      - name: Package npm binary artifact
        run: |
          mkdir -p "dist/${{ matrix.npm_target }}"
          cp "target/${{ matrix.rust_target }}/release/xbot" "dist/${{ matrix.npm_target }}/xbot"
          tar -C "dist/${{ matrix.npm_target }}" -czf "dist/xbot-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}.tar.gz" xbot
      - name: Package deb
        env:
          DEB_HOST_ARCH: ${{ matrix.deb_arch }}
        run: |
          if [ "${{ matrix.rust_target }}" = "aarch64-unknown-linux-gnu" ]; then
            cargo deb \
              --no-build \
              --no-strip \
              --target ${{ matrix.rust_target }} \
              --output "dist/xbot-${{ matrix.npm_target }}.deb"
          else
            cargo deb \
              --no-build \
              --target ${{ matrix.rust_target }} \
              --output "dist/xbot-${{ matrix.npm_target }}.deb"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: xbot-${{ matrix.npm_target }}
          path: |
            dist/*.tar.gz
            dist/*.deb

  macos:
    name: macos-${{ matrix.npm_target }}
    runs-on: macos-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-apple-darwin
            npm_target: darwin-x64
          - rust_target: aarch64-apple-darwin
            npm_target: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.rust_target }}
      - name: Package npm binary artifact
        run: |
          mkdir -p "dist/${{ matrix.npm_target }}"
          cp "target/${{ matrix.rust_target }}/release/xbot" "dist/${{ matrix.npm_target }}/xbot"
          tar -C "dist/${{ matrix.npm_target }}" -czf "dist/xbot-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}.tar.gz" xbot
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-${{ matrix.npm_target }}
          path: dist/*.tar.gz

  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: [validate, linux, macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.tar.gz *.deb > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-release-artifacts
          path: dist/*
      - name: Upload artifacts to release
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}
          name: xbot v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: dist/*

  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    if: github.event_name == 'push' || github.event_name == 'release'
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip when NPM_TOKEN is not configured
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping npm publish."
      - uses: actions/checkout@v4
        if: env.NODE_AUTH_TOKEN != ''
      - uses: actions/setup-node@v4
        if: env.NODE_AUTH_TOKEN != ''
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish npm package
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish ./npm --access public --provenance

  publish-crates:
    name: publish-crates
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    if: github.event_name == 'push' || github.event_name == 'release'
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Skip when CARGO_REGISTRY_TOKEN is not configured
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
      - uses: actions/checkout@v4
        if: env.CARGO_REGISTRY_TOKEN != ''
      - uses: dtolnay/rust-toolchain@stable
        if: env.CARGO_REGISTRY_TOKEN != ''
      - name: Publish crates.io package
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
