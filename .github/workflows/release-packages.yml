name: release-packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  pages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Validate that all package versions match the tag
  # ---------------------------------------------------------------------------
  validate:
    name: validate-release-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate package versions
        id: version
        run: |
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          npm_version="$(node -p "require('./npm/package.json').version")"
          if [ "$cargo_version" != "$npm_version" ]; then
            echo "Cargo.toml version ($cargo_version) must match npm/package.json version ($npm_version)" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            expected_tag="v${cargo_version}"
            if [ "${{ github.ref_name }}" != "$expected_tag" ]; then
              echo "Tag ${{ github.ref_name }} must match package version $expected_tag" >&2
              exit 1
            fi
          fi

          if [ "${{ github.event_name }}" = "release" ]; then
            expected_tag="v${cargo_version}"
            if [ "${{ github.event.release.tag_name }}" != "$expected_tag" ]; then
              echo "Release tag ${{ github.event.release.tag_name }} must match package version $expected_tag" >&2
              exit 1
            fi
          fi

          echo "version=${cargo_version}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux builds: x64 and ARM64 deb + tarball
  # ---------------------------------------------------------------------------
  linux:
    name: linux-${{ matrix.npm_target }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-unknown-linux-musl
            npm_target: linux-x64
            deb_arch: amd64
          - rust_target: aarch64-unknown-linux-musl
            npm_target: linux-arm64
            deb_arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: taiki-e/install-action@cross
      - uses: taiki-e/install-action@cargo-deb
      - name: Build binary
        run: cross build --release --target ${{ matrix.rust_target }}
      - name: Package tarball
        run: |
          mkdir -p "dist/${{ matrix.npm_target }}"
          cp "target/${{ matrix.rust_target }}/release/xbot" "dist/${{ matrix.npm_target }}/xbot"
          tar -C "dist/${{ matrix.npm_target }}" -czf "dist/xbot-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}.tar.gz" xbot
      - name: Package deb
        env:
          DEB_HOST_ARCH: ${{ matrix.deb_arch }}
        run: |
          cargo deb \
            --no-build \
            --no-strip \
            --target ${{ matrix.rust_target }} \
            --output "dist/xbot-${{ matrix.npm_target }}.deb"
      - name: Verify Linux binary and Debian package are glibc-independent
        run: |
          set -eu
          if readelf -l "target/${{ matrix.rust_target }}/release/xbot" | grep -q 'INTERP'; then
            echo "Musl Linux binary must not require a dynamic ELF interpreter" >&2
            exit 1
          fi

          depends="$(dpkg-deb -f "dist/xbot-${{ matrix.npm_target }}.deb" Depends)"
          echo "Debian dependencies: ${depends}"
          if printf '%s\n' "${depends}" | grep -q 'libc6'; then
            echo "Musl Linux package must not depend on glibc/libc6" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: xbot-${{ matrix.npm_target }}
          path: |
            dist/*.tar.gz
            dist/*.deb

  # ---------------------------------------------------------------------------
  # macOS builds: x64 and ARM64 tarball
  # ---------------------------------------------------------------------------
  macos:
    name: macos-${{ matrix.npm_target }}
    runs-on: macos-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-apple-darwin
            npm_target: darwin-x64
          - rust_target: aarch64-apple-darwin
            npm_target: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.rust_target }}
      - name: Package tarball
        run: |
          mkdir -p "dist/${{ matrix.npm_target }}"
          cp "target/${{ matrix.rust_target }}/release/xbot" "dist/${{ matrix.npm_target }}/xbot"
          tar -C "dist/${{ matrix.npm_target }}" -czf "dist/xbot-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}.tar.gz" xbot
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-${{ matrix.npm_target }}
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Windows builds: x64 zip
  # ---------------------------------------------------------------------------
  windows:
    name: windows-${{ matrix.npm_target }}
    runs-on: windows-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-pc-windows-msvc
            npm_target: win32-x64
          - rust_target: aarch64-pc-windows-msvc
            npm_target: win32-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.rust_target }}
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.npm_target }}"
          Copy-Item "target/${{ matrix.rust_target }}/release/xbot.exe" "dist/${{ matrix.npm_target }}/xbot.exe"
          Compress-Archive -Path "dist/${{ matrix.npm_target }}/xbot.exe" -DestinationPath "dist/xbot-${{ needs.validate.outputs.version }}-${{ matrix.npm_target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-${{ matrix.npm_target }}
          path: dist/*.zip

  # ---------------------------------------------------------------------------
  # Checksums + GitHub Release
  # ---------------------------------------------------------------------------
  checksums:
    name: checksums
    runs-on: ubuntu-latest
    needs: [validate, linux, macos, windows]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.zip" \) \
            -exec sha256sum {} + > SHA256SUMS
          cat SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-release-artifacts
          path: dist/*
      - name: Upload artifacts to release
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}
          name: xbot v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.zip
            dist/SHA256SUMS

  # ---------------------------------------------------------------------------
  # Publish GitHub Pages: landing page + install.sh
  # ---------------------------------------------------------------------------
  publish-pages:
    name: publish-pages
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p site
          cp -r paged/* site/

          cat > site/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          VERSION="__VERSION__"
          PAGES_BASE="https://guoqingbao.github.io/xbot"
          RELEASE_BASE="https://github.com/__REPO__/releases/download/v${VERSION}"

          detect_platform() {
            local os arch
            os="$(uname -s)"
            arch="$(uname -m)"
            case "$os" in
              Linux)
                case "$arch" in
                  x86_64|amd64)  echo "linux-x64" ;;
                  aarch64|arm64) echo "linux-arm64" ;;
                  *) echo "ERROR: Unsupported architecture: $arch" >&2; exit 1 ;;
                esac ;;
              Darwin)
                case "$arch" in
                  x86_64|amd64)  echo "darwin-x64" ;;
                  arm64|aarch64) echo "darwin-arm64" ;;
                  *) echo "ERROR: Unsupported architecture: $arch" >&2; exit 1 ;;
                esac ;;
              MINGW*|MSYS*|CYGWIN*)
                case "$arch" in
                  x86_64|amd64)  echo "win32-x64" ;;
                  aarch64|arm64) echo "win32-arm64" ;;
                  *) echo "ERROR: Unsupported Windows architecture: $arch" >&2; exit 1 ;;
                esac ;;
              *) echo "ERROR: Unsupported OS: $os" >&2; exit 1 ;;
            esac
          }

          PLATFORM="${XBOT_PLATFORM:-$(detect_platform)}"
          echo "==> Detected platform: ${PLATFORM}"
          echo ""

          SUDO=""
          if [ "$(id -u)" -ne 0 ] && command -v sudo &>/dev/null; then SUDO="sudo"; fi

          print_hints() {
            echo ""
            echo "============================================"
            echo " xbot installed successfully!"
            echo "============================================"
            echo ""
            echo " Quick start:"
            echo "   xbot onboard          # Initialize config"
            echo "   xbot repl             # Interactive TUI mode"
            echo "   xbot chat \"hello\"     # One-shot prompt"
            echo "   xbot run              # Start backend service"
            echo ""
            echo " Documentation:"
            echo "   ${PAGES_BASE}/"
            echo "============================================"
          }

          install_deb() {
            local deb="xbot-${1}.deb" tmp
            tmp="$(mktemp -d)"
            echo "==> Downloading ${deb}..."
            if ! curl -fSL -o "${tmp}/${deb}" "${RELEASE_BASE}/${deb}"; then
              echo "ERROR: Failed to download" >&2; rm -rf "$tmp"; return 1
            fi
            echo "==> Installing..."
            if ! ${SUDO} dpkg -i "${tmp}/${deb}"; then
              echo "ERROR: dpkg failed. Re-run with: curl -sSL ${PAGES_BASE}/install.sh | sudo bash" >&2
              rm -rf "$tmp"; return 1
            fi
            rm -rf "$tmp"
            print_hints
          }

          install_tarball() {
            local tarball="xbot-${VERSION}-${1}.tar.gz" tmp
            tmp="$(mktemp -d)"
            echo "==> Downloading ${tarball}..."
            if ! curl -fSL -o "${tmp}/${tarball}" "${RELEASE_BASE}/${tarball}"; then
              echo "ERROR: Failed to download" >&2; rm -rf "$tmp"; return 1
            fi
            tar -xzf "${tmp}/${tarball}" -C "${tmp}"
            echo "==> Installing xbot to /usr/local/bin..."
            if ! ${SUDO} install -m 755 "${tmp}/xbot" /usr/local/bin/xbot; then
              echo "ERROR: Install failed. Re-run with: curl -sSL ${PAGES_BASE}/install.sh | sudo bash" >&2
              rm -rf "$tmp"; return 1
            fi
            rm -rf "$tmp"
            print_hints
          }

          install_zip() {
            local zip="xbot-${VERSION}-${1}.zip" tmp
            tmp="$(mktemp -d)"
            echo "==> Downloading ${zip}..."
            if ! curl -fSL -o "${tmp}/${zip}" "${RELEASE_BASE}/${zip}"; then
              echo "ERROR: Failed to download" >&2; rm -rf "$tmp"; return 1
            fi
            echo "==> Extracting..."
            if command -v unzip &>/dev/null; then
              unzip -o "${tmp}/${zip}" -d "${tmp}" >/dev/null
            elif command -v powershell &>/dev/null; then
              powershell -Command "Expand-Archive -Path '${tmp}/${zip}' -DestinationPath '${tmp}' -Force"
            else
              echo "ERROR: No unzip or powershell found" >&2; rm -rf "$tmp"; return 1
            fi
            local install_dir="/usr/local/bin"
            if [ -d "/c/Windows" ]; then
              install_dir="${HOME}/bin"
              mkdir -p "${install_dir}"
            fi
            cp "${tmp}/xbot.exe" "${install_dir}/xbot.exe" 2>/dev/null || cp "${tmp}/xbot" "${install_dir}/xbot" 2>/dev/null
            echo "==> Installed xbot to ${install_dir}"
            rm -rf "$tmp"
            print_hints
          }

          case "$PLATFORM" in
            linux-x64|linux-arm64)
              echo "Install options:"
              echo "  1) deb package  — installs 'xbot' system-wide (Debian/Ubuntu)"
              echo "  2) binary       — installs 'xbot' to /usr/local/bin"
              echo ""
              MODE="${XBOT_MODE:-}"
              if [ -z "$MODE" ]; then
                if [ -e /dev/tty ]; then
                  printf "Choose [1/2] (default: 1): "
                  read -r MODE < /dev/tty
                  MODE="${MODE:-1}"
                else MODE="1"; fi
              fi
              case "$MODE" in
                1|deb) install_deb "$PLATFORM" ;;
                2|binary) install_tarball "$PLATFORM" ;;
                *) echo "Invalid: $MODE"; exit 1 ;;
              esac ;;
            darwin-*) install_tarball "$PLATFORM" ;;
            win32-*) install_zip "$PLATFORM" ;;
            *) echo "ERROR: Unknown platform: $PLATFORM" >&2; exit 1 ;;
          esac
          SCRIPT

          sed -i "s|__VERSION__|${VERSION}|g" site/install.sh
          sed -i "s|__REPO__|${REPO}|g" site/install.sh
          sed -i 's/^          //' site/install.sh
          chmod +x site/install.sh

      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deploy

  # ---------------------------------------------------------------------------
  # Publish npm package
  # ---------------------------------------------------------------------------
  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    if: github.event_name == 'push' || github.event_name == 'release'
    environment: NPM_TOKEN
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip when NPM_TOKEN is not configured
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping npm publish."
      - uses: actions/checkout@v4
        if: env.NODE_AUTH_TOKEN != ''
      - uses: actions/setup-node@v4
        if: env.NODE_AUTH_TOKEN != ''
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish npm package
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish ./npm --access public --provenance

  # ---------------------------------------------------------------------------
  # Publish crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: publish-crates
    runs-on: ubuntu-latest
    needs: [validate, checksums]
    if: github.event_name == 'push' || github.event_name == 'release'
    environment: CARGO_REGISTRY_TOKEN
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Skip when CARGO_REGISTRY_TOKEN is not configured
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
      - uses: actions/checkout@v4
        if: env.CARGO_REGISTRY_TOKEN != ''
      - uses: dtolnay/rust-toolchain@stable
        if: env.CARGO_REGISTRY_TOKEN != ''
      - name: Publish crates.io package
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
